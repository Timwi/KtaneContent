    <script>
        const setRules = random => {
            const colors = ["red", "blue", "black"],
                letters = ["A", "B", "C"],
                numPages = 4,
                numWires = 9,
                numPerPage = 3;

            for (const color of colors) {
                for (let i = 0; i < numPages; i++) {
                    for (let t = 0; t < numWires; t++) {
                        const conn = [];
                        for (let j = 0; j < numPerPage; j++)
                            if (random.nextDouble() < 0.4)
                                conn.push(letters[j]);

                        if (!conn.length)
                            conn.push(letters[random.nextMax(numPerPage)]);

                        const text = conn.join("");
                        document.querySelector(`[data-seq="${color}:${i}:${t}"]`).textContent = text;
                    }
                }
            }
        };

        const setDefaultRules = setRules;
    </script>
