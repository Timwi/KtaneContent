            </div>
            <div class="page-content">
                <img src="img/Component/Shattered.svg" class="diagram">
                <h2>モジュール詳細：バラバラ</h2>
                <p class="flavour-text">あなたの希望や夢みたいに。</p>
                <ul>
                    <li>このモジュールの鏡はバラバラに砕け散った。</li>
                    <li>鏡の破片をフレーム内に戻して、モジュールを解除する。</li>
                    <li>破片を持った状態でRキーを押すと、それを回転させることができる。</li>
                    <li>すべての破片がフレーム内に入っていない場合、
                    <br>または破片同士がわずかでも重なり合っている場合、モジュールは解除されない。</li>
                </ul>
