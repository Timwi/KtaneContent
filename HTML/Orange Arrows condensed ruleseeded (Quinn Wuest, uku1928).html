<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1">
    <title>Orange Arrows — Keep Talking and Nobody Explodes Module</title>
    <link rel="stylesheet" type="text/css" href="css/font.css">
    <link rel="stylesheet" type="text/css" href="css/normalize.css">
    <link rel="stylesheet" type="text/css" href="css/main.css">
    <script src="js/ktane-utils.js"></script>
    <script src="js/ruleseed.js"></script>
    <script>
        let countStrs = [
            "every third arrow",
            "every fourth arrow",
            "every fifth arrow",
        ];
        let dirStrs = [
            "the opposite direction",
            "one clockwise",
            "one counter-clockwise",
        ];
        function setDefaultRules(rnd) {
            setRules(rnd);
        }
        function setRules(rnd) {
            let count = rnd.next(0, 3);
            let dir = rnd.next(0, 3);
            let cId = document.getElementById("arrow-count");
            let dId = document.getElementById("arrow-dir");
            cId.innerHTML = countStrs[count];
            dId.innerHTML = dirStrs[dir];
        }
    </script>
    <style>
        body.ruleseed-active .rule {
            text-decoration: underline;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="section">
        <div class="page page-bg-01">
            <div class="page-header">
                <span class="page-header-doc-title">Keep Talking and Nobody Explodes Mod</span>
                <span class="page-header-section-title">Orange Arrows</span>
            </div>
            <div class="page-content">
                <img src="img/Component/Orange Arrows.svg" class="diagram">
                <h2>On the Subject of Orange Arrows</h2>
                <p class="flavour-text">Only one sentence required.</p>
                <p>Submit the sequence, except <span class="rule" id="arrow-count">every fourth arrow</span> is <span class="rule" id="arrow-dir">the opposite direction</span>.</p>
            </div>
           <div class="page-footer relative-footer">Page 1 of 1</div>
        </div>
    </div>
</body>
</html>
